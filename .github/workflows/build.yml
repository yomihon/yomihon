name: Build & Test
on:
  pull_request:
    paths:
      - '**'
      - '!**.md'
      - '!i18n/src/commonMain/moko-resources/**/strings.xml'
      - '!i18n/src/commonMain/moko-resources/**/plurals.xml'
      - 'i18n/src/commonMain/moko-resources/base/strings.xml'
      - 'i18n/src/commonMain/moko-resources/base/plurals.xml'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test App
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@56339e523c0409420f6c2c9a2f4292bbb3c07dd3 # v4.8.0

      - name: Set up JDK
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Download ML models
        run: |
          FILES=(
            "bluolightning/manga-ocr-tflite:mocr_2025_decoder_float32.tflite:app/src/main/assets/ocr/decoder.tflite:b6f0b49e7537abc24de4d5e7f44c71c3e04b4f30a9dac6b5704db94c963ce31b"
            "bluolightning/manga-ocr-tflite:mocr_2025_encoder_fp32.tflite:app/src/main/assets/ocr/encoder.tflite:126441c11edb3f3c9da639647ba82d846872a7ad51d62cdbc50767fa5abf4f43"
            "bluolightning/manga-ocr-tflite:mocr_2025_embeddings_float32.bin:app/src/main/assets/ocr/embeddings.bin:ef1959fd6b2ed011b782722d975a67332b859ccc717688ad06a16d170145bc6c"
            "bluolightning/manga-ocr-mobile:v1_fp16/decoder.tflite:app/src/main/assets/ocr_fast/decoder.tflite:116db3f02364ceac91f86f46e54979d4fd7209e8d8820f3812410b0d732ee2b8"
            "bluolightning/manga-ocr-mobile:v1_fp16/encoder.tflite:app/src/main/assets/ocr_fast/encoder.tflite:d724e5682c874b98202d4ac8f3e84848cd9d06a5e27cb0dadb27ebaea1b35f47"
            "leoxs22/manga-panel-detector-yolo26n:manga_panel_detector_int8.tflite:data/src/main/assets/panel_detector/model.tflite:b1a7d8d4492e04a777ae0d3efd9dc1fbd6e8f361971eadb813279ce3dfd1b464"
          )

          for item in "${FILES[@]}"; do
            IFS=":" read -r REPO_PATH REMOTE_PATH LOCAL_PATH HASH <<< "$item"
            mkdir -p "$(dirname "$LOCAL_PATH")"
            echo "Downloading $REMOTE_PATH from $REPO_PATH..."
            curl -sL "https://huggingface.co/$REPO_PATH/resolve/main/$REMOTE_PATH?download=true" -o "$LOCAL_PATH"
            echo "$HASH  $LOCAL_PATH" | sha256sum -c - || { echo "Hash mismatch for $LOCAL_PATH"; exit 1; }
          done

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Build app
        run: ./gradlew assembleRelease -Pinclude-telemetry -Penable-updater

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Upload APK (arm64)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: arm64-v8a-${{ github.sha }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk

      - name: Upload APK (universal)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: universal-${{ github.sha }}
          path: app/build/outputs/apk/release/app-universal-release-unsigned.apk

      - name: Upload mapping
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release
